<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FYP Admin — Login</title>
<meta name="robots" content="noindex,nofollow" />
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    margin: 0;
    background: #0a0a0a;
    color: #f5f5f5;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .box {
    background: #181818;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 32px 28px;
    width: 100%;
    max-width: 340px;
  }
  h1 {
    font-size: 16px;
    margin: 0 0 6px;
    color: #fff;
  }
  p {
    font-size: 13px;
    color: #888;
    margin: 0 0 20px;
  }
  input[type="password"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #333;
    border-radius: 8px;
    background: #0a0a0a;
    color: #fff;
    font-size: 16px;
    outline: none;
  }
  input[type="password"]:focus {
    border-color: #4ade80;
  }
  button {
    width: 100%;
    padding: 12px;
    background: #4ade80;
    color: #0a0a0a;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    margin-top: 12px;
    cursor: pointer;
  }
  button:active { opacity: 0.85; }
  .err {
    color: #f87171;
    font-size: 12px;
    margin-top: 10px;
    min-height: 16px;
  }
</style>
</head>
<body>
  <form class="box" id="loginForm">
    <h1>FYP Admin</h1>
    <p>Enter password</p>
    <input type="password" id="password" name="password" autofocus required />
    <button type="submit">Sign in</button>
    <div class="err" id="err"></div>
  </form>

<script>
const form = document.getElementById('loginForm');
const errEl = document.getElementById('err');
form.addEventListener('submit', async function (e) {
  e.preventDefault();
  errEl.textContent = '';
  const pass = document.getElementById('password').value;
  try {
    const r = await fetch('/api/admin-login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pass }),
    });
    if (r.ok) {
      window.location.href = '/admin/';
    } else {
      errEl.textContent = 'Wrong password';
    }
  } catch (_) {
    errEl.textContent = 'Error — try again';
  }
});
</script>
</body>
</html>
